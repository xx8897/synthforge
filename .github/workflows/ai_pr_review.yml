# AI PR Review Workflow
# AI PR 審查工作流
#
# 功能說明 (Features):
# - 當 PR 被創建、更新或重新開啟時自動觸發
# - 使用 reviewer_agent 自動審查代碼變更
# - 在 PR 中發布審查結果評論
# - 自動運行測試
#
# 使用場景 (Use Cases):
# - 自動化代碼審查流程
# - 確保代碼質量標準
# - 提供即時反饋給開發者
#
# 相關文檔 (Related Docs):
# - agents/reviewer_agent/AGENT.md
# - docs/guides/WORKFLOW_GUIDE.md

name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]  # PR 開啟、同步、重新開啟時觸發

jobs:
  ai-review:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read          # 讀取代碼權限
      pull-requests: write    # 寫入 PR 評論權限
    
    steps:
      - name: Checkout code  # 檢出代碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 獲取完整歷史記錄
      
      - name: Set up Python  # 設置 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies  # 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found"
          pip install pytest pytest-cov pyyaml click
      
      - name: Run AI Code Review  # 運行 AI 代碼審查
        id: review
        run: |
          # 獲取變更的文件列表
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
          
          # 對變更文件運行 reviewer agent
          python agents/reviewer_agent/reviewer.py $(cat changed_files.txt) > review_result.txt || true
          
          # 檢查審查是否通過
          if grep -q "✅ Code review passed" review_result.txt; then
            echo "review_status=passed" >> $GITHUB_OUTPUT
          else
            echo "review_status=failed" >> $GITHUB_OUTPUT
          fi
          
          # 保存審查輸出
          cat review_result.txt
      
      - name: Comment PR with Review Results  # 在 PR 中發布審查結果
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewResult = fs.readFileSync('review_result.txt', 'utf8');
            
            const comment = `## 🤖 AI Code Review
            
            ${reviewResult}
            
            ---
            *Automated review by synthforge AI*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Run Tests  # 運行測試
        run: |
          pytest workflows/tests/ -v || echo "No tests found"
      
      - name: Check Review Status  # 檢查審查狀態
        if: steps.review.outputs.review_status == 'failed'
        run: |
          echo "⚠️ AI review found issues. Please review the comments."
          exit 0  # 不讓工作流失敗，僅警告
