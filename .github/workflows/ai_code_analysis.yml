# AI Code Analysis Workflow
# AI 代碼分析工作流
#
# 功能說明 (Features):
# - 在 push 到 main/develop 分支時觸發
# - 在 PR 到 main/develop 分支時觸發
# - 每週一自動運行（定時任務）
# - 執行代碼複雜度分析、Linting、測試覆蓋率檢查
# - 驗證所有 workflow 模板的有效性
# - 生成完整的分析報告
#
# 使用場景 (Use Cases):
# - 持續監控代碼質量
# - 定期檢查代碼健康度
# - 為 PR 提供詳細的分析報告
# - 發現潛在的代碼問題
#
# 相關文檔 (Related Docs):
# - docs/guides/WORKFLOW_GUIDE.md
# - rules/development/CODING_STYLE_RULE.md

name: AI Code Analysis

on:
  push:
    branches: [main, develop]  # push 到主分支時觸發
  pull_request:
    branches: [main, develop]  # PR 到主分支時觸發
  schedule:
    # 每週一 00:00 UTC 運行
    - cron: '0 0 * * 1'

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read   # 讀取代碼權限
      issues: write    # 創建 Issue 權限（用於定時任務發現問題時）
    
    steps:
      - name: Checkout code  # 檢出代碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 獲取完整歷史記錄
      
      - name: Set up Python  # 設置 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies  # 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found"
          pip install pytest pytest-cov pyyaml click radon pylint
      
      - name: Run Code Complexity Analysis  # 運行代碼複雜度分析
        id: complexity
        run: |
          echo "## Code Complexity Analysis" > analysis_report.md
          echo "" >> analysis_report.md
          
          # 使用 radon 分析複雜度
          echo "### Cyclomatic Complexity" >> analysis_report.md
          radon cc . -a -s >> analysis_report.md || echo "No Python files found" >> analysis_report.md
          
          echo "" >> analysis_report.md
          echo "### Maintainability Index" >> analysis_report.md
          radon mi . -s >> analysis_report.md || echo "No Python files found" >> analysis_report.md
      
      - name: Run Linting  # 運行代碼檢查
        id: lint
        continue-on-error: true
        run: |
          echo "" >> analysis_report.md
          echo "## Linting Results" >> analysis_report.md
          echo "" >> analysis_report.md
          
          # 對關鍵目錄運行 pylint
          for dir in workflows agents skills; do
            if [ -d "$dir" ]; then
              echo "### $dir/" >> analysis_report.md
              pylint $dir --output-format=text >> analysis_report.md 2>&1 || true
              echo "" >> analysis_report.md
            fi
          done
      
      - name: Run Tests with Coverage  # 運行測試並生成覆蓋率報告
        id: test
        continue-on-error: true
        run: |
          echo "" >> analysis_report.md
          echo "## Test Coverage" >> analysis_report.md
          echo "" >> analysis_report.md
          
          # 運行測試並生成覆蓋率報告
          pytest workflows/tests/ --cov=workflows --cov=agents --cov=skills \
            --cov-report=term --cov-report=html \
            >> analysis_report.md 2>&1 || echo "No tests found" >> analysis_report.md
      
      - name: Analyze Workflow Validity  # 驗證 Workflow 有效性
        id: workflow
        run: |
          echo "" >> analysis_report.md
          echo "## Workflow Validation" >> analysis_report.md
          echo "" >> analysis_report.md
          
          # 驗證所有 workflow 模板
          for workflow in workflows/templates/*.yml; do
            if [ -f "$workflow" ]; then
              echo "### $(basename $workflow)" >> analysis_report.md
              python devtools/cli.py workflow validate "$workflow" >> analysis_report.md 2>&1 || true
              echo "" >> analysis_report.md
            fi
          done
      
      - name: Generate Summary  # 生成分析摘要
        id: summary
        run: |
          echo "" >> analysis_report.md
          echo "## Summary" >> analysis_report.md
          echo "" >> analysis_report.md
          echo "- **Analysis Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> analysis_report.md
          echo "- **Branch**: ${{ github.ref_name }}" >> analysis_report.md
          echo "- **Commit**: ${{ github.sha }}" >> analysis_report.md
          
          cat analysis_report.md
      
      - name: Upload Analysis Report  # 上傳分析報告
        uses: actions/upload-artifact@v3
        with:
          name: code-analysis-report
          path: |
            analysis_report.md
            htmlcov/
      
      - name: Comment on PR (if PR)  # 在 PR 中發布報告（如果是 PR 觸發）
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('analysis_report.md', 'utf8');
            
            // 如果報告太長則截斷（GitHub 評論限制）
            const maxLength = 65000;
            const truncatedReport = report.length > maxLength 
              ? report.substring(0, maxLength) + '\n\n... (truncated)'
              : report;
            
            const comment = `## 🤖 AI Code Analysis Report
            
            ${truncatedReport}
            
            ---
            *Automated analysis by synthforge AI*
            
            📊 [Full Report Available in Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Create Issue for Critical Findings (scheduled only)  # 為嚴重問題創建 Issue（僅定時任務）
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('analysis_report.md', 'utf8');
            
            // 檢查是否有嚴重問題（可自定義邏輯）
            const hasCriticalIssues = report.includes('ERROR') || 
                                     report.includes('CRITICAL') ||
                                     report.includes('rated at 0.00/10');
            
            if (hasCriticalIssues) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Weekly Code Analysis: Critical Issues Found',
                body: `## Critical Issues Detected in Weekly Analysis
                
                The automated weekly code analysis has detected critical issues that require attention.
                
                ### Quick Summary
                - **Analysis Date**: ${new Date().toISOString()}
                - **Branch**: ${context.ref}
                
                ### Actions Required
                1. Review the full analysis report in the workflow artifacts
                2. Address critical issues
                3. Run tests locally
                4. Create fixes as needed
                
                ### Full Report
                See the [workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for the complete analysis report.
                
                ---
                *Automated issue created by synthforge AI Code Analysis*`,
                labels: ['automated', 'code-quality', 'priority: high']
              });
            }
