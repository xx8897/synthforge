agent:
  name: reviewer_agent
  version: 1.0.0
  role: Code Review and Quality Assurance
  
settings:
  check_style: true
  check_security: true
  check_performance: true
  check_tests: true
  check_documentation: true
  
thresholds:
  min_coverage: 80
  max_complexity: 10
  max_function_length: 50
  max_file_length: 500
  
auto_fix:
  enabled: false
  fix_minor_issues: false
